<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - Q-TEST</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ... (Phần CSS giữ nguyên như cũ của bạn vì đã rất đẹp) ... */
        :root {
            --brand: #1565C0;
            --bg: #F3F3F3;
            --card: #FFFFFF;
            --border: #E5E7EB;
            --muted: rgba(17, 24, 39, 0.55);
            --text: #111827;
            --danger: #DC2626;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 18px; }
        .card { width: min(640px, 100%); background: var(--card); border: 1px solid rgba(229, 231, 235, 0.75); border-radius: 6px; box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06); padding: 26px 28px 22px; }
        h1 { margin: 0 0 14px; text-align: center; font-size: 18px; font-weight: 700; color: var(--text); }
        .field { margin-top: 10px; }
        input { width: 100%; height: 34px; border: 1px solid var(--border); border-radius: 4px; padding: 0 10px; font-size: 13px; outline: none; }
        input::placeholder { color: rgba(17, 24, 39, 0.35); }
        .input-wrap { position: relative; }
        .toggle { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; padding: 4px; color: rgba(107, 114, 128, 0.9); }
        .roles { margin-top: 12px; display: flex; gap: 48px; align-items: center; justify-content: center; font-size: 12px; color: rgba(17, 24, 39, 0.70); }
        .roles label { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .btn { margin-top: 14px; width: 100%; height: 38px; border: none; border-radius: 4px; background: var(--brand); color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; }
        .btn:hover { filter: brightness(0.95); }
        .footer { margin-top: 14px; text-align: center; font-size: 11px; color: var(--muted); }
        .footer a { color: var(--muted); text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }
        .error { margin-top: 10px; background: rgba(220, 38, 38, 0.06); border: 1px solid rgba(220, 38, 38, 0.22); color: var(--danger); padding: 8px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Đăng ký</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'quiz:register' %}">
            {% csrf_token %}

            <div class="field">
                <input type="text" name="ho_ten" placeholder="Họ tên" required autocomplete="name">
            </div>

            <div class="field">
                <input type="email" name="email" placeholder="Nhập email" required autocomplete="email">
            </div>

            <div class="field">
                <div class="input-wrap">
                    <input id="pwd1" type="password" name="password" placeholder="Mật khẩu" required autocomplete="new-password">
                    <button class="toggle" type="button" aria-label="Hiện/ẩn mật khẩu" onclick="togglePwd('pwd1','eye1')">
                        <svg id="eye1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="field">
                <div class="input-wrap">
                    <input id="pwd2" type="password" name="password2" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
                    <button class="toggle" type="button" aria-label="Hiện/ẩn mật khẩu" onclick="togglePwd('pwd2','eye2')">
                        <svg id="eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="roles">
                <label>
                    <input type="radio" name="role" value="day">
                    <span>Người dạy</span>
                </label>
                <label>
                    <input type="radio" name="role" value="hoc" checked>
                    <span>Người học</span>
                </label>
            </div>

            <button type="submit" class="btn">Đăng ký</button>
        </form>

        <div class="footer">
            Đã có tài khoản? <a href="{% url 'quiz:login' %}">Đăng nhập</a>
        </div>
    </div>

    <script>
        function togglePwd(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            const isPwd = input.type === 'password';
            input.type = isPwd ? 'text' : 'password';
            eye.style.opacity = isPwd ? '0.55' : '1';
        }
    </script>
</body>
</html>
