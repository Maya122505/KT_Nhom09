<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Khôi phục mật khẩu - Q-TEST</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #1565C0;
            --bg: #F3F3F3;
            --card: #FFFFFF;
            --border: #E5E7EB;
            --muted: rgba(17, 24, 39, 0.55);
            --text: #111827;
            --danger: #DC2626;
            --ok: #15803D;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }

        .card {
            width: min(640px, 100%);
            background: var(--card);
            border: 1px solid rgba(229, 231, 235, 0.75);
            border-radius: 6px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
            padding: 26px 28px 22px;
        }

        h1 {
            margin: 0 0 14px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        input {
            width: 100%;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            margin-top: 10px;
        }

        input::placeholder { color: rgba(17, 24, 39, 0.35); }

        .btn {
            margin-top: 14px;
            width: 100%;
            height: 38px;
            border: none;
            border-radius: 4px;
            background: var(--brand);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover { filter: brightness(0.95); }

        .footer {
            margin-top: 14px;
            text-align: center;
            font-size: 11px;
            color: var(--muted);
        }

        .footer a { color: var(--muted); text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }

        .error, .success {
            margin-top: 10px;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .error {
            background: rgba(220, 38, 38, 0.06);
            border: 1px solid rgba(220, 38, 38, 0.22);
            color: var(--danger);
        }

        .success {
            background: rgba(21, 128, 61, 0.07);
            border: 1px solid rgba(21, 128, 61, 0.22);
            color: var(--ok);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Khôi phục mật khẩu</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="{% url 'quiz:recover_password' %}">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Nhập email" required autocomplete="email">
            <button class="btn" type="submit">Gửi mã xác nhận</button>
        </form>

        <div class="footer">
            <a href="{% url 'quiz:login' %}">Quay lại đăng nhập</a>
        </div>
    </div>
</body>
</html>
