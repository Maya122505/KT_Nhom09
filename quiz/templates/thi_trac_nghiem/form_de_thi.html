{% extends 'base.html' %}

{% block title %}{% if de_thi %}Sửa đề thi{% else %}Tạo đề thi mới{% endif %} - Q-TEST{% endblock %}

{% block extra_css %}
<style>
    /* GIỮ NGUYÊN VÀ CĂN CHỈNH CSS FORM CỦA UYÊN */
    .form-container-center {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px 0;
    }
    .form-card { 
        background: white; 
        padding: 30px; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        width: 100%;
        max-width: 450px; /* Tăng nhẹ độ rộng cho thoải mái */
        border: 1px solid #eef2f6;
    }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; color: #1b2559; }
    input, select { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid #e2e8f0; 
        border-radius: 8px; 
        box-sizing: border-box; 
        font-size: 14px;
        transition: 0.3s;
    }
    input:focus, select:focus {
        outline: none;
        border-color: #1e5bb8;
        box-shadow: 0 0 0 3px rgba(30, 91, 184, 0.1);
    }
    .btn-save { 
        width: 100%; 
        padding: 14px; 
        background: #1e5bb8; 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: 800; 
        margin-top: 10px; 
        font-size: 15px; 
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .btn-save:hover { background: #154c9e; transform: translateY(-1px); }
</style>
{% endblock %}

{% block content %}
<div class="form-container-center">
    <div class="form-card">
        <h2 style="color: #1b2559; text-align: center; margin: 0 0 25px 0; font-weight: 800;">
            {% if de_thi %}SỬA ĐỀ THI{% else %}TẠO ĐỀ THI MỚI{% endif %}
        </h2>

        <form method="POST" action="{% url 'quiz:tao_de_thi_moi' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Tên đề thi</label>
                <input type="text" name="ten_de" value="{{ de_thi.tenDeThi|default:'' }}" required placeholder="Ví dụ: Kiểm tra 15p">
            </div>

            <div class="form-group">
                <label>ID Lớp học</label>
                <input type="number" name="lop_id" value="{{ de_thi.lopHoc_id|default:'' }}" required placeholder="Ví dụ: 1, 2...">
            </div>

            <div class="form-group">
                <label>Thời gian làm bài (phút)</label>
                <input type="number" name="thoi_gian" value="{{ de_thi.thoiGianLamBai|default:15 }}" required>
            </div>

            <div class="form-group">
                <label>Số lần làm bài tối đa</label>
                <input type="number" name="so_lan" value="{{ de_thi.soLanLamToiDa|default:1 }}" required>
            </div>

            <div class="form-group">
                <label>Mật khẩu (Tùy chọn)</label>
                <input type="text" name="mat_khau" value="{{ de_thi.matKhauDeThi|default:'' }}" placeholder="Bỏ trống nếu thi tự do">
            </div>

            <div class="form-group">
                <label>Trạng thái</label>
                <select name="trang_thai">
                    <option value="BAN_NHAP" {% if de_thi.trangThai =="BAN_NHAP" %}selected{% endif %}>Bản nháp</option>
                    <option value="DA_CONG_BO" {% if de_thi.trangThai =="DA_CONG_BO" %}selected{% endif %}>Đã công bố (Sắp mở)</option>
                    <option value="DANG_THI" {% if de_thi.trangThai =="DANG_THI" %}selected{% endif %}>Đang diễn ra</option>
                    <option value="KET_THUC" {% if de_thi.trangThai =="KET_THUC" %}selected{% endif %}>Đã kết thúc</option>
                    <option value="HUY" {% if de_thi.trangThai =="HUY" %}selected{% endif %}>Đã hủy</option>
                </select>
            </div>

            <button type="submit" class="btn-save">LƯU THÔNG TIN</button>
            
            <a href="{% url 'quiz:quan_ly_de_thi' %}" style="text-decoration: none; color: #64748b; font-size: 14px; display: block; text-align: center; font-weight: 600; margin-top: 20px;">
                ← Quay lại danh sách
            </a>
        </form>
    </div>
</div>
{% endblock %}
