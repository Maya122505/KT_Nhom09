<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - Q-TEST</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #1565C0;
            --bg: #F3F3F3;
            --card: #FFFFFF;
            --border: #E5E7EB;
            --muted: rgba(17, 24, 39, 0.55);
            --text: #111827;
            --danger: #DC2626;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }

        .card {
            width: min(640px, 100%);
            background: var(--card);
            border: 1px solid rgba(229, 231, 235, 0.75);
            border-radius: 6px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
            padding: 26px 28px 22px;
        }

        h1 {
            margin: 0 0 16px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .field { margin-top: 12px; position: relative; }

        input {
            width: 100%;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        /* Highlight đỏ khi có lỗi */
        input.input-error { border-color: var(--danger); }

        input::placeholder { color: rgba(17, 24, 39, 0.35); }

        .input-wrap { position: relative; }
        .toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 4px;
            color: rgba(107, 114, 128, 0.9);
        }

        .forgot {
            margin-top: 10px;
            font-size: 11px;
            color: var(--muted);
        }

        .forgot a { color: var(--muted); text-decoration: none; }
        .forgot a:hover { text-decoration: underline; }

        .btn {
            margin-top: 14px;
            width: 100%;
            height: 38px;
            border: none;
            border-radius: 4px;
            background: var(--brand);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover { filter: brightness(0.95); }

        .footer {
            margin-top: 14px;
            text-align: center;
            font-size: 11px;
            color: var(--muted);
        }

        .footer a { color: var(--muted); text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }

        /* Style cho thông báo lỗi dưới ô input */
        .error-msg {
            display: none;
            color: var(--danger);
            font-size: 11px;
            margin-top: 4px;
        }

        /* Style cho lỗi tổng quát từ Server */
        .error-summary {
            margin-bottom: 14px;
            background: rgba(220, 38, 38, 0.06);
            border: 1px solid rgba(220, 38, 38, 0.22);
            color: var(--danger);
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Đăng nhập</h1>

        <!-- Hiển thị lỗi tổng quát từ Backend nếu có -->
        {% if error %}
        <div class="error-summary">{{ error }}</div>
        {% endif %}

        <!-- Thêm novalidate để tắt cảnh báo mặc định của Edge/Chrome -->
        <form id="loginForm" method="POST" action="{% url 'quiz:login' %}" novalidate>
            {% csrf_token %}

            <div class="field">
                <input type="email" name="email" id="email" placeholder="Email" autocomplete="email">
                <div id="email-error" class="error-msg">Vui lòng điền vào trường này</div>
            </div>

            <div class="field">
                <div class="input-wrap">
                    <input id="pwd" type="password" name="password" placeholder="Mật khẩu" autocomplete="current-password">
                    <button class="toggle" type="button" aria-label="Hiện/ẩn mật khẩu" onclick="togglePwd('pwd', 'eye')">
                        <svg id="eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div id="pwd-error" class="error-msg">Vui lòng điền vào trường này</div>
            </div>

            <div class="forgot">
                <a href="{% url 'quiz:recover_password' %}">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn">Đăng nhập</button>
        </form>

        <div class="footer">
            Bạn chưa có tài khoản? <a href="{% url 'quiz:register' %}">Tạo một tài khoản mới?</a>
        </div>
    </div>

    <script>
        // Hàm ẩn/hiện mật khẩu
        function togglePwd(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            const isPwd = input.type === 'password';
            input.type = isPwd ? 'text' : 'password';
            eye.style.opacity = isPwd ? '0.55' : '1';
        }

        // Xử lý kiểm tra lỗi đồng bộ khi Submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            let hasError = false;
            const email = document.getElementById('email');
            const pwd = document.getElementById('pwd');
            const emailError = document.getElementById('email-error');
            const pwdError = document.getElementById('pwd-error');

            // Kiểm tra Email
            if (!email.value.trim()) {
                emailError.style.display = 'block';
                email.classList.add('input-error');
                hasError = true;
            } else {
                emailError.style.display = 'none';
                email.classList.remove('input-error');
            }

            // Kiểm tra Mật khẩu
            if (!pwd.value.trim()) {
                pwdError.style.display = 'block';
                pwd.classList.add('input-error');
                hasError = true;
            } else {
                pwdError.style.display = 'none';
                pwd.classList.remove('input-error');
            }

            // Ngăn gửi form nếu có lỗi trống trường
            if (hasError) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
