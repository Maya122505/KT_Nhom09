<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Q-TEST System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 400px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .login-card h2 {
            font-size: 20px;
            margin-bottom: 30px;
            color: #1b2559;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            color: #4a5568;
        }

        input::placeholder { color: #a0aec0; }

        .forgot-password {
            text-align: left;
            font-size: 12px;
            color: #718096;
            margin-top: -15px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #1e5bb8; /* Màu xanh đậm đúng mẫu */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover { background-color: #164a96; }

        .footer-link {
            margin-top: 25px;
            font-size: 13px;
            color: #718096;
        }

        .footer-link a {
            color: #1e5bb8;
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg {
            color: #e53e3e;
            font-size: 13px;
            margin-bottom: 15px;
            background: #fff5f5;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Đăng nhập</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'quiz:login' %}">
        {% csrf_token %}

        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Mật khẩu" required>
        </div>

        <div class="forgot-password">Quên mật khẩu?</div>

        <button type="submit" class="btn-login">Đăng nhập</button>
    </form>

    <div class="footer-link">
        Bạn chưa có tài khoản? <a href="#">Tạo một tài khoản mới?</a>
    </div>
</div>
</body>
</html>
